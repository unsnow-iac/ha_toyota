---
name: "Validate"

on:
  push:
    branches: ["main", "testing"]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  # HACS-publish validation (topics, issues-enabled, brands) intentionally
  # dropped on this fork: we deploy via /apply-toyota, not HACS-default, so those
  # publish-readiness checks don't apply. Hassfest (manifest correctness) stays.
  hassfest:
    runs-on: "ubuntu-latest"
    name: "Hassfest"
    steps:
      - name: "⤵️ Check out code from GitHub"
        uses: "actions/checkout@v7"
      - name: "🏠 Hassfest validation"
        uses: "home-assistant/actions/hassfest@master"
